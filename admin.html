<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mall Of Royal Red Bull</title>
    <style>
        :root { --red: #cc0000; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--red); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 8px; background: #000; color: white; box-sizing: border-box; }
        label { font-size: 0.9rem; color: #aaa; margin-top: 10px; display: block; }
        button { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-panel" class="container">
        <h2>Admin Portal</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button id="btn-login">Login to Dashboard</button>
    </div>

    <div id="upload-panel" class="container hidden">
        <h2>Add New Item</h2>
        
        <label>Target Collection:</label>
        <select id="category">
            <option value="products">Merchandise Store</option>
            <option value="food">Food Court</option>
        </select>

        <input type="text" id="name" placeholder="Item Name">
        <input type="text" id="price" placeholder="Price">
        <textarea id="desc" placeholder="Brief Description"></textarea>
        
        <label>Google Drive Image Link:</label>
        <input type="text" id="image-url" placeholder="Paste Drive link here">

        <button id="btn-save">Add to Live Site</button>
        <button id="btn-logout" style="background:#333; margin-top:10px;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnUgYIKWUrF19cZrD50y39MxKTOrEaT1U",
            authDomain: "mall-of-royal-red-bull.firebaseapp.com",
            projectId: "mall-of-royal-red-bull",
            storageBucket: "mall-of-royal-red-bull.firebasestorage.app",
            messagingSenderId: "371387584316",
            appId: "1:371387584316:web:d693c83d4628e3f5dd5839"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('upload-panel').classList.remove('hidden');
            } else {
                document.getElementById('login-panel').classList.remove('hidden');
                document.getElementById('upload-panel').classList.add('hidden');
            }
        });

        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        document.getElementById('btn-save').onclick = async () => {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const desc = document.getElementById('desc').value;
            const url = document.getElementById('image-url').value;
            const collectionName = document.getElementById('category').value;

            if (!name || !url) return alert("Please enter a name and image link!");

            try {
                await addDoc(collection(db, collectionName), {
                    name, price, description: desc, image: url, createdAt: serverTimestamp()
                });
                alert("Added to " + collectionName + "!");
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store Admin - Add Items</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Add New Item</h2>
    <input type="text" id="itemName" placeholder="Product Name (e.g., Cool Shirt)">
    <input type="text" id="itemPrice" placeholder="Price (e.g., $25.00)">
    <input type="text" id="itemImg" placeholder="Image URL (Link to a photo)">
    <textarea id="itemDesc" placeholder="Brief description..."></textarea>
    <button id="uploadBtn">List Product Locally</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('uploadBtn').onclick = async () => {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        const desc = document.getElementById('itemDesc').value;

        if(!name || !price) return alert("Name and Price are required!");

        try {
            await addDoc(collection(db, "merchandise"), {
                name, price, img, desc,
                createdAt: serverTimestamp()
            });
            alert("Success! Item added to store.");
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        } catch (e) {
            alert("Error: " + e.message);
        }
    };
</script>
</body>
</html>

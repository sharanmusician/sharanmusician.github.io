<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart | Mall of Royal Red Bull</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 20px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CONTAINER --- */
        .cart-container { padding: 15px; max-width: 800px; margin: 0 auto; min-height: 60vh; }
        
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }

        .item-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

        /* --- PROFESSIONAL EMPTY STATE (The Fix) --- */
        #emptyCartView {
            display: none; /* Managed by JS */
            text-align: center;
            padding: 80px 20px;
        }

        .empty-illustration {
            width: 140px; height: 140px;
            background: #16161a;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px auto;
            border: 1px solid #222;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .empty-headline { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .empty-subtext { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; max-width: 250px; margin-left: auto; margin-right: auto; }

        .shop-btn {
            display: inline-block;
            background: var(--neon-green);
            color: #000;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(0, 200, 83, 0.3);
        }

        /* --- BOTTOM SUMMARY BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .total-amount { font-size: 22px; font-weight: 900; }
        .place-order-btn {
            background: var(--neon-green); color: #000;
            padding: 14px 30px; border-radius: 8px; font-weight: 900;
            text-decoration: none; font-size: 11px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← Continue</a>
    <div class="page-title">Shopping Cart</div>
    <div style="width: 50px;"></div>
</header>

<div class="cart-container">
    <div id="cartItemsList"></div>

    <div id="emptyCartView">
        <div class="empty-illustration">🛒</div>
        <h1 class="empty-headline">Your cart is empty!</h1>
        <p class="empty-subtext">Looks like you haven't added anything to your cart yet.</p>
        <a href="merchandise.html" class="shop-btn">Start Shopping</a>
    </div>
</div>

<div class="summary-bar" id="bottomBar">
    <div>
        <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Estimated Total</div>
        <div class="total-amount" id="countDisplay">0 Items</div>
    </div>
    <a href="https://instagram.com/myfoodproductsputhukkadai" class="place-order-btn">Place Order</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    function render() {
        const list = document.getElementById('cartItemsList');
        const emptyView = document.getElementById('emptyCartView');
        const bottomBar = document.getElementById('bottomBar');
        const countText = document.getElementById('countDisplay');

        list.innerHTML = '';

        if (!cart || cart.length === 0) {
            // Show the "Empty" message and hide the bottom bar
            emptyView.style.display = 'block';
            bottomBar.style.display = 'none';
            return;
        }

        // If items exist, show them and the bottom bar
        emptyView.style.display = 'none';
        bottomBar.style.display = 'flex';

        cart.forEach(item => {
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div class="item-name">${item.title}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                             <div style="color:var(--neon-green); font-weight:800;">${item.price}</div>
                             <button onclick="remove('${item.id}')" style="background:none; border:none; color:var(--danger-red); font-size:10px; font-weight:700; text-transform:uppercase;">Remove</button>
                        </div>
                    </div>
                </div>
            `;
        });

        countText.innerText = `${getCartCount()} Items`;
    }

    function remove(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        render();
    }

    window.onload = render;
</script>

</body>
</html>

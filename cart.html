<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Selection | Royal Red Bull Cart</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        /* --- GLOBAL & PROTECTION --- */
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            padding-bottom: 120px; /* Space for sticky summary */
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 18px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CART LIST --- */
        .cart-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .item-img { width: 85px; height: 85px; border-radius: 8px; object-fit: cover; border: 1px solid #222; }
        
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .item-name { font-size: 14px; font-weight: 600; color: var(--royal-white); margin-bottom: 4px; }
        .item-price { font-size: 15px; font-weight: 800; color: var(--neon-green); }

        .item-actions { display: flex; gap: 8px; margin-top: 10px; }

        /* --- BUTTONS --- */
        .remove-btn {
            background: transparent; color: var(--danger-red);
            border: 1px solid rgba(255, 59, 59, 0.2);
            font-size: 9px; font-weight: 800; padding: 8px 12px;
            border-radius: 6px; text-transform: uppercase; cursor: pointer;
        }

        .ig-order-btn {
            flex: 1; background: var(--neon-green); color: #000;
            text-align: center; text-decoration: none;
            font-size: 9px; font-weight: 900; padding: 8px;
            border-radius: 6px; text-transform: uppercase;
        }

        /* --- EMPTY STATE --- */
        .empty-cart { text-align: center; padding: 80px 20px; display: none; }
        .empty-cart-icon { font-size: 50px; margin-bottom: 20px; opacity: 0.3; }
        .empty-cart p { color: var(--text-gray); margin-bottom: 25px; font-size: 14px; }
        .shop-now-btn { 
            display: inline-block; background: var(--neon-green); color: #000;
            padding: 12px 35px; border-radius: 8px; font-weight: 800; text-decoration: none; font-size: 13px;
        }

        /* --- SUMMARY BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 2px solid var(--neon-green);
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .total-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .total-count { font-size: 18px; font-weight: 900; color: var(--royal-white); }
        
        .checkout-all-btn {
            background: var(--neon-green); color: #000;
            padding: 12px 25px; border-radius: 8px; font-weight: 900;
            text-decoration: none; font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← Close</a>
    <div class="page-title">Shopping Cart</div>
    <div style="width: 40px;"></div> </header>

<div class="cart-container" id="cartList">
    </div>

<div class="empty-cart" id="emptyCart">
    <div class="empty-cart-icon">🛒</div>
    <h2 style="margin-bottom: 10px;">Your cart is empty</h2>
    <p>Selection is currently empty. Explore our organic provisions.</p>
    <a href="merchandise.html" class="shop-now-btn">GO TO STORE</a>
</div>

<div class="summary-bar" id="summaryBar">
    <div>
        <div class="total-label">Subtotal</div>
        <div class="total-count" id="cartTotal">0 Items</div>
    </div>
    <a href="https://instagram.com/myfoodproductsputhukkadai" class="checkout-all-btn">ORDER VIA INSTAGRAM</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    const listElement = document.getElementById('cartList');
    const emptyElement = document.getElementById('emptyCart');
    const summaryElement = document.getElementById('summaryBar');
    const totalElement = document.getElementById('cartTotal');

    function renderCartPage() {
        // Clear list
        listElement.innerHTML = '';
        
        // Show empty state if no items
        if (cart.length === 0) {
            emptyElement.style.display = 'block';
            summaryElement.style.display = 'none';
            return;
        }

        // Show items
        emptyElement.style.display = 'none';
        summaryElement.style.display = 'flex';

        cart.forEach(item => {
            const itemHTML = `
                <div class="cart-item" id="item-${item.id}">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div>
                            <div class="item-name">${item.title}</div>
                            <div class="item-price">${item.price} <span style="color:#555; font-size:11px;">(Qty: ${item.quantity})</span></div>
                        </div>
                        <div class="item-actions">
                            <button class="remove-btn" onclick="removeItem('${item.id}')">Remove</button>
                            <a href="https://instagram.com/myfoodproductsputhukkadai" class="ig-order-btn">Direct Order</a>
                        </div>
                    </div>
                </div>
            `;
            listElement.innerHTML += itemHTML;
        });

        totalElement.innerText = `${getCartCount()} Items`;
    }

    function removeItem(id) {
        // Filter the global cart array (defined in cart.js)
        cart = cart.filter(item => item.id !== id);
        saveCart(); // Function from cart.js
        renderCartPage();
    }

    // Initialize Page
    window.onload = renderCartPage;
</script>

</body>
  </html>

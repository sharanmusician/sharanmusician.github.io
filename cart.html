<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart | Royal Red Bull</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 20px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CENTER CONTENT --- */
        .cart-container { 
            padding: 15px; 
            max-width: 800px; 
            margin: 0 auto; 
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers the empty message vertically */
        }
        
        /* Empty State Styling */
        .empty-box {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }
        .empty-icon { font-size: 60px; margin-bottom: 15px; opacity: 0.4; }
        .empty-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .empty-msg { color: var(--text-gray); font-size: 14px; max-width: 280px; margin: 0 auto; }

        /* --- PRODUCT LIST --- */
        #cartItemsList { width: 100%; }
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            text-align: left;
        }
        .item-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }

        /* --- BOTTOM BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .total-amount { font-size: 22px; font-weight: 900; }

        #dynamicBtn {
            background: var(--neon-green);
            color: #000;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 900;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 160px;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← Continue</a>
    <div class="page-title">Shopping Cart</div>
    <div style="width: 50px;"></div>
</header>

<div class="cart-container" id="mainDisplay">
    </div>

<div class="summary-bar">
    <div>
        <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Estimated Total</div>
        <div class="total-amount" id="itemCount">0 Items</div>
    </div>
    <a href="merchandise.html" id="dynamicBtn">Shop Now</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    function renderCart() {
        const display = document.getElementById('mainDisplay');
        const countText = document.getElementById('itemCount');
        const actionBtn = document.getElementById('dynamicBtn');

        // Check if cart is empty
        if (!cart || cart.length === 0) {
            // 1. Show Professional Message at Center
            display.innerHTML = `
                <div class="empty-box">
                    <div class="empty-icon">🛒</div>
                    <div class="empty-title">Your cart is feeling light</div>
                    <p class="empty-msg">Explore our premium organic collection and add your favorite treats to the bag!</p>
                </div>
            `;
            
            // 2. Set Bottom Button to "Shop Now"
            actionBtn.innerText = "Shop Now";
            actionBtn.href = "merchandise.html";
            countText.innerText = "0 Items";
            return;
        }

        // If products exist
        display.style.justifyContent = "flex-start";
        display.innerHTML = '<div id="cartItemsList"></div>';
        const list = document.getElementById('cartItemsList');

        // 3. Set Bottom Button to "Order via Instagram"
        actionBtn.innerText = "Order Via Instagram";
        actionBtn.href = "https://instagram.com/myfoodproductsputhukkadai";

        cart.forEach(item => {
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div style="flex:1;">
                        <div style="font-weight:600;">${item.title}</div>
                        <div style="color:var(--neon-green); font-weight:800;">${item.price}</div>
                    </div>
                    <button onclick="removeItem('${item.id}')" style="background:none; border:none; color:var(--danger-red); font-size:10px; font-weight:700;">REMOVE</button>
                </div>
            `;
        });

        countText.innerText = `${getCartCount()} Items`;
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCart();
    }

    window.onload = renderCart;
</script>

</body>
</html>

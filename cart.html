<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Selection | Royal Red Bull Cart</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        /* --- GLOBAL RESET & PROTECTION --- */
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
            padding-bottom: 120px;
        }

        /* --- STICKY HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 18px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CART LIST CONTAINER --- */
        .cart-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-img { width: 90px; height: 90px; border-radius: 8px; object-fit: cover; border: 1px solid #222; }
        
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .item-name { font-size: 14px; font-weight: 600; color: var(--royal-white); }
        .item-price { font-size: 15px; font-weight: 800; color: var(--neon-green); margin-top: 2px; }

        .item-actions { display: flex; gap: 8px; margin-top: 10px; }

        /* --- BUTTON STYLES --- */
        .remove-btn {
            background: transparent; color: var(--danger-red);
            border: 1px solid rgba(255, 59, 59, 0.2);
            font-size: 9px; font-weight: 800; padding: 8px 12px;
            border-radius: 6px; text-transform: uppercase; cursor: pointer;
        }

        .ig-order-btn {
            flex: 1; background: var(--neon-green); color: #000;
            text-align: center; text-decoration: none;
            font-size: 9px; font-weight: 900; padding: 8px;
            border-radius: 6px; text-transform: uppercase;
        }

        /* --- PROFESSIONAL EMPTY STATE --- */
        .empty-cart { 
            text-align: center; 
            padding: 120px 30px; 
            display: none; 
        }
        .empty-icon { font-size: 50px; margin-bottom: 25px; filter: grayscale(1); opacity: 0.15; }
        .empty-title { font-size: 20px; font-weight: 700; color: var(--royal-white); margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
        .empty-text { color: var(--text-gray); font-size: 13px; line-height: 1.8; max-width: 260px; margin: 0 auto 35px auto; font-weight: 300; }
        
        .return-btn { 
            display: inline-block; 
            background: transparent; 
            color: var(--neon-green); 
            border: 1px solid var(--neon-green);
            padding: 12px 35px; 
            border-radius: 4px; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: opacity 0.2s;
        }
        .return-btn:active { opacity: 0.6; }

        /* --- STICKY SUMMARY BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .total-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .total-amount { font-size: 18px; font-weight: 900; color: var(--royal-white); }
        
        .checkout-all-btn {
            background: var(--neon-green); color: #000;
            padding: 12px 25px; border-radius: 8px; font-weight: 900;
            text-decoration: none; font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← CLOSE</a>
    <div class="page-title">SHOPPING CART</div>
    <div style="width: 50px;"></div> 
</header>

<div class="cart-container" id="cartList">
    </div>

<div class="empty-cart" id="emptyCart">
    <div class="empty-icon">🛍️</div>
    <h2 class="empty-title">Your Selection is Empty</h2>
    <p class="empty-text">It appears you haven't curated your collection yet. Explore our premium organic provisions to begin.</p>
    <a href="merchandise.html" class="return-btn">RETURN TO STORE</a>
</div>

<div class="summary-bar" id="summaryBar">
    <div>
        <div class="total-label">Subtotal</div>
        <div class="total-amount" id="cartTotal">0 Items</div>
    </div>
    <a href="https://instagram.com/myfoodproductsputhukkadai" class="checkout-all-btn">ORDER VIA INSTAGRAM</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    const listElement = document.getElementById('cartList');
    const emptyElement = document.getElementById('emptyCart');
    const summaryElement = document.getElementById('summaryBar');
    const totalElement = document.getElementById('cartTotal');

    function renderCartPage() {
        listElement.innerHTML = '';
        
        if (cart.length === 0) {
            emptyElement.style.display = 'block';
            summaryElement.style.display = 'none';
            return;
        }

        emptyElement.style.display = 'none';
        summaryElement.style.display = 'flex';

        cart.forEach(item => {
            const itemHTML = `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div>
                            <div class="item-name">${item.title}</div>
                            <div class="item-price">${item.price} <span style="color:#555; font-size:10px;">QTY: ${item.quantity}</span></div>
                        </div>
                        <div class="item-actions">
                            <button class="remove-btn" onclick="removeItem('${item.id}')">Remove</button>
                            <a href="https://instagram.com/myfoodproductsputhukkadai" class="ig-order-btn">Direct Order</a>
                        </div>
                    </div>
                </div>
            `;
            listElement.innerHTML += itemHTML;
        });

        totalElement.innerText = `${getCartCount()} Items`;
    }

    function removeItem(id) {
        cart = cart.filter(item => item.id !== id);
        saveCart();
        renderCartPage();
    }

    window.addEventListener('DOMContentLoaded', renderCartPage);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart | Royal Red Bull</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 20px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- MAIN CONTAINER --- */
        .cart-container { 
            padding: 15px; 
            max-width: 800px; 
            margin: 0 auto; 
            min-height: 70vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; /* Vertical Center for Message */
        }
        
        #cartItemsList { width: 100%; margin-top: 10px; }

        /* --- PRODUCT ITEM STYLING --- */
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-img { width: 75px; height: 75px; border-radius: 10px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

        /* --- PROFESSIONAL GLASS OPACITY BOX --- */
        .glass-empty-box {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            padding: 45px 30px; 
            border-radius: 28px; 
            text-align: center; 
            width: 100%; 
            max-width: 330px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .empty-icon { font-size: 55px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(0, 200, 83, 0.25)); }
        .empty-headline { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 12px; letter-spacing: -0.5px; }
        .empty-subtext { color: #888; font-size: 13px; line-height: 1.6; }

        /* --- DYNAMIC BOTTOM BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .total-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .total-count { font-size: 20px; font-weight: 900; }

        #actionBtn {
            background: var(--neon-green);
            color: #000;
            padding: 15px 35px;
            border-radius: 10px;
            font-weight: 900;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
            text-align: center;
            min-width: 170px;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← Continue</a>
    <div class="page-title">Shopping Cart</div>
    <div style="width: 50px;"></div>
</header>

<div class="cart-container" id="mainDisplay">
    </div>

<div class="summary-bar">
    <div>
        <div class="total-label">Estimated Total</div>
        <div class="total-count" id="countLabel">0 Items</div>
    </div>
    <a href="merchandise.html" id="actionBtn">Shop Now</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    function render() {
        const display = document.getElementById('mainDisplay');
        const countLabel = document.getElementById('countLabel');
        const btn = document.getElementById('actionBtn');

        // IF CART IS EMPTY
        if (!cart || cart.length === 0) {
            display.style.justifyContent = "center"; // Center the box
            display.innerHTML = `
                <div class="glass-empty-box">
                    <div class="empty-icon">🛍️</div>
                    <h2 class="empty-headline">Your bag is empty</h2>
                    <p class="empty-subtext">
                        Looks like you haven't added any premium products yet. 
                        Explore our catalogue to find your favorites!
                    </p>
                </div>
            `;
            
            // Set Bottom Button to "Shop Now"
            btn.innerText = "Shop Now";
            btn.href = "merchandise.html";
            countLabel.innerText = "0 Items";
            return;
        }

        // IF CART HAS ITEMS
        display.style.justifyContent = "flex-start"; // Align items to top
        display.innerHTML = '<div id="cartItemsList"></div>';
        const list = document.getElementById('cartItemsList');

        // Set Bottom Button to "Order Via Instagram"
        btn.innerText = "Order Via Instagram";
        btn.href = "https://instagram.com/myfoodproductsputhukkadai";

        cart.forEach(item => {
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div style="font-weight:600; font-size:15px;">${item.title}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="color:var(--neon-green); font-weight:800; font-size:16px;">${item.price}</div>
                            <button onclick="deleteItem('${item.id}')" style="background:none; border:none; color:var(--danger-red); font-size:10px; font-weight:800; text-transform:uppercase;">Remove</button>
                        </div>
                    </div>
                </div>
            `;
        });

        countLabel.innerText = `${getCartCount()} Items`;
    }

    function deleteItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        render();
    }

    window.onload = render;
</script>

</body>
</html>

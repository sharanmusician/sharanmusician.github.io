<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Selection | Mall of Royal Red Bull</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-dark);
            padding: 20px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CONTENT AREA --- */
        .cart-container { padding: 15px; max-width: 800px; margin: 0 auto; min-height: calc(100vh - 200px); }
        
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }

        .item-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

        /* --- PROFESSIONAL EMPTY MESSAGE --- */
        #emptyCartMessage {
            display: none;
            text-align: center;
            padding: 100px 20px;
        }
        .empty-icon { font-size: 60px; margin-bottom: 20px; filter: grayscale(1); opacity: 0.3; }
        .empty-headline { font-size: 22px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        .empty-subtext { color: var(--text-gray); font-size: 14px; max-width: 280px; margin: 0 auto; line-height: 1.5; }

        /* --- DYNAMIC BOTTOM BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .total-amount { font-size: 22px; font-weight: 900; }
        
        /* The Action Button */
        #dynamicActionButton {
            background: var(--neon-green);
            color: #000;
            padding: 14px 25px;
            border-radius: 8px;
            font-weight: 900;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            min-width: 150px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← CONTINUE</a>
    <div class="page-title">SHOPPING CART</div>
    <div style="width: 50px;"></div>
</header>

<div class="cart-container">
    <div id="cartItemsList"></div>

    <div id="emptyCartMessage">
        <div class="empty-icon">🛍️</div>
        <h1 class="empty-headline">Your cart is empty</h1>
        <p class="empty-subtext">Add some premium organic provisions to your cart and start your healthy journey today!</p>
    </div>
</div>

<div class="summary-bar">
    <div>
        <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Estimated Total</div>
        <div class="total-amount" id="countDisplay">0 Items</div>
    </div>
    <a href="merchandise.html" id="dynamicActionButton">Shop Now</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    function render() {
        const list = document.getElementById('cartItemsList');
        const emptyView = document.getElementById('emptyCartMessage');
        const countText = document.getElementById('countDisplay');
        const actionBtn = document.getElementById('dynamicActionButton');

        list.innerHTML = '';

        if (!cart || cart.length === 0) {
            // SHOW EMPTY MESSAGE
            emptyView.style.display = 'block';
            
            // SET BUTTON TO "SHOP NOW"
            actionBtn.innerText = "Shop Now";
            actionBtn.href = "merchandise.html";
            
            // RESET COUNT
            countText.innerText = "0 Items";
            return;
        }

        // IF PRODUCTS EXIST
        emptyView.style.display = 'none';
        
        // SET BUTTON TO "ORDER VIA INSTAGRAM"
        actionBtn.innerText = "Order Via Instagram";
        actionBtn.href = "https://instagram.com/myfoodproductsputhukkadai";

        cart.forEach(item => {
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div style="font-weight:600; font-size:15px;">${item.title}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                             <div style="color:var(--neon-green); font-weight:800;">${item.price}</div>
                             <button onclick="removeItem('${item.id}')" style="background:none; border:none; color:var(--danger-red); font-size:10px; font-weight:700; text-transform:uppercase;">Remove</button>
                        </div>
                    </div>
                </div>
            `;
        });

        countText.innerText = `${getCartCount()} Items`;
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        render();
    }

    window.onload = render;
</script>

</body>
</html>

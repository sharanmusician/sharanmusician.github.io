<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart | Mall of Royal Red Bull</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;        
            --card-bg: #111114;       
            --neon-green: #00c853;    
            --royal-white: #ffffff;
            --text-gray: #a0a0a0;
            --danger-red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--royal-white);
            line-height: 1.6;
            padding-bottom: 120px;
        }

        header {
            background-color: var(--bg-dark);
            padding: 18px 15px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1f1f23;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-link { color: var(--neon-green); text-decoration: none; font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .page-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CART ITEMS --- */
        .cart-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .cart-item {
            background: var(--card-bg);
            border: 1px solid #1f1f23;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-size: 15px; font-weight: 600; }
        .item-price { font-size: 16px; font-weight: 800; color: var(--neon-green); }

        .item-actions { display: flex; gap: 8px; margin-top: 10px; }

        /* --- BUTTONS --- */
        .remove-btn {
            background: transparent; color: var(--danger-red);
            border: 1px solid rgba(255, 59, 59, 0.2);
            font-size: 9px; font-weight: 800; padding: 10px;
            border-radius: 6px; text-transform: uppercase; cursor: pointer;
        }

        .ig-order-btn {
            flex: 1; background: var(--neon-green); color: #000;
            text-align: center; text-decoration: none;
            font-size: 9px; font-weight: 900; padding: 10px;
            border-radius: 6px; text-transform: uppercase;
        }

        /* --- PROFESSIONAL "FEEL GOOD" EMPTY STATE --- */
        #emptyCartDisplay { 
            text-align: center; 
            padding: 100px 25px;
            display: none;
        }

        .empty-visual {
            font-size: 65px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 200, 83, 0.2));
        }

        .empty-headline {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
        }

        .empty-subtext {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 35px auto;
        }

        .cta-shop-button { 
            display: inline-block;
            background: var(--neon-green);
            color: #000;
            padding: 16px 50px;
            border-radius: 30px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.25);
            transition: 0.3s;
        }

        /* --- SUMMARY BAR --- */
        .summary-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #0f0f12; border-top: 1px solid #1f1f23;
            padding: 20px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .total-amount { font-size: 18px; font-weight: 900; color: var(--royal-white); }
        .checkout-all-btn {
            background: var(--neon-green); color: #000;
            padding: 12px 25px; border-radius: 8px; font-weight: 900;
            text-decoration: none; font-size: 11px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <a href="javascript:history.back()" class="back-link">← Continue</a>
    <div class="page-title">Shopping Cart</div>
    <div style="width: 40px;"></div>
</header>

<div class="cart-container" id="cartList"></div>

<div id="emptyCartDisplay">
    <div class="empty-visual">🛒</div>
    <h1 class="empty-headline">Your bag is craving for some treats!</h1>
    <p class="empty-subtext">There's nothing in here yet. Start shopping to fill it with your favorite organic provisions.</p>
    <a href="merchandise.html" class="cta-shop-button">Start Shopping</a>
</div>

<div class="summary-bar" id="summaryBar">
    <div>
        <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Estimated Total</div>
        <div class="total-amount" id="cartTotal">0 Items</div>
    </div>
    <a href="https://instagram.com/myfoodproductsputhukkadai" class="checkout-all-btn">Proceed to Order</a>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
    const listElement = document.getElementById('cartList');
    const emptyUI = document.getElementById('emptyCartDisplay');
    const summaryUI = document.getElementById('summaryBar');
    const totalCountUI = document.getElementById('cartTotal');

    function renderCart() {
        listElement.innerHTML = '';
        
        // Handle Empty State with "Feel Good" UI
        if (!cart || cart.length === 0) {
            emptyUI.style.display = 'block';
            summaryUI.style.display = 'none';
            return;
        }

        // Handle Active State
        emptyUI.style.display = 'none';
        summaryUI.style.display = 'flex';

        cart.forEach(item => {
            listElement.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" class="item-img">
                    <div class="item-details">
                        <div>
                            <div class="item-name">${item.title}</div>
                            <div class="item-price">${item.price} <span style="color:#555; font-size:11px;">(Qty: ${item.quantity})</span></div>
                        </div>
                        <div class="item-actions">
                            <button class="remove-btn" onclick="removeProduct('${item.id}')">Remove</button>
                            <a href="https://instagram.com/myfoodproductsputhukkadai" class="ig-order-btn">Order Now</a>
                        </div>
                    </div>
                </div>
            `;
        });

        totalCountUI.innerText = `${getCartCount()} Items`;
    }

    function removeProduct(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCart();
    }

    window.onload = renderCart;
</script>

</body>
</html>

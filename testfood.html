<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Red Bull - Food Court</title>
    <style>
        /* Food Court Branding */
        :root { --red-bull: #cc0000; --gold: #ffcc00; --dark: #1a1a1a; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fdfdfd; color: #222; }
        
        header { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            color: white; 
            padding: 80px 20px; 
            text-align: center; 
        }

        .container { max-width: 1100px; margin: -40px auto 50px; padding: 0 20px; }

        /* Grid for Food Cards */
        #food-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        /* Card Styling (Matches testproducts.js structure) */
        .card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
        }

        .card h3 { margin: 20px 20px 10px; color: var(--red-bull); }

        .card p { padding: 0 20px; color: #666; font-size: 0.95rem; flex-grow: 1; }

        .price { 
            font-size: 1.4rem; 
            font-weight: bold; 
            padding: 10px 20px; 
            color: var(--dark); 
        }

        button { 
            background: var(--red-bull); 
            color: white; 
            border: none; 
            padding: 15px; 
            width: calc(100% - 40px); 
            margin: 0 20px 20px;
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #990000; }

        .loader { text-align: center; padding: 100px; font-style: italic; color: #888; }
    </style>
</head>
<body>

<header>
    <h1>Royal Red Bull Food Court</h1>
    <p>Premium Dining & Fast Fuel</p>
</header>

<div class="container">
    <div id="food-grid">
        <p class="loader">Preparing the menu...</p>
    </div>
</div>

<script type="module">
    import { loadCollection } from './testproducts.js';

    // This calls the 'food' collection from your Firestore database
    loadCollection('food', 'food-grid');
</script>

</body>
</html>

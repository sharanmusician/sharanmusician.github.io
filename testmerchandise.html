<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Merchandise Store</title>
    <style>
        /* Simple Modern Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-card img {
            max-width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }

        .price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.2rem;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>

<header>
    <h1>Official Merchandise Store</h1>
</header>

<div class="container">
    <h2>Available Items</h2>
    <div class="product-grid">
        
        <div class="product-card">
            <img src="https://via.placeholder.com/250" alt="T-Shirt">
            <h3>Classic Logo T-Shirt</h3>
            <p>Premium cotton, unisex fit.</p>
            <p class="price">$25.00</p>
            <button onclick="alert('Added to cart!')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/250" alt="Hoodie">
            <h3>Heavyweight Hoodie</h3>
            <p>Perfect for those cold coding nights.</p>
            <p class="price">$45.00</p>
            <button onclick="alert('Added to cart!')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/250" alt="Mug">
            <h3>Developer Mug</h3>
            <p>Guaranteed to hold coffee.</p>
            <p class="price">$15.00</p>
            <button onclick="alert('Added to cart!')">Add to Cart</button>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall Of Royal Red Bull - Merchandise</title>
    <style>
        /* Modern Mall Styling */
        :root { --red-bull: #cc0000; --navy: #24292e; --light: #f4f4f4; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        
        header { 
            background: var(--red-bull); 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Product Grid */
        #product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        /* Product Cards - Matches the structure in testproducts.js */
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-8px); }

        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 8px; 
            background: #eee;
        }

        .price { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--red-bull); 
            margin: 15px 0; 
            display: block;
        }

        button { 
            background: var(--navy); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #000; }

        .loading-msg { text-align: center; font-size: 1.2rem; color: #666; padding: 50px; }
    </style>
</head>
<body>

<header>
    <h1>Mall Of Royal Red Bull</h1>
    <p>Premium Merchandise Collection</p>
</header>

<div class="container">
    <div id="product-grid">
        <p class="loading-msg">Opening the mall doors...</p>
    </div>
</div>

<script type="module">
    import { loadCollection } from './testproducts.js';

    // This command tells the script to look into your 'products' collection 
    // and display them in the 'product-grid' div.
    loadCollection('products', 'product-grid');
</script>

</body>
</html>
